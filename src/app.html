<!doctype html>
<html lang="id" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23080808'/%3E%3Crect width='96' height='96' x='2' y='2' rx='18' fill='none' stroke='%2338bdf8' stroke-width='4'/%3E%3Ctext x='50%25' y='50%25' font-family='Arial, sans-serif' font-size='48' font-weight='bold' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'%3ESS%3C/text%3E%3C/svg%3E">
		%sveltekit.head%
	</head>
	<body class="antialiased" id="body-wrapper">
		<script>
			// Failsafe perlindungan anti-stuck loading screen
			// Jika terjadi error hydration pada Svelte, preloader tetap akan terhapus setelah 4.2 detik.
			setTimeout(() => {
				const pl = document.getElementById('preloader');
				const bw = document.getElementById('body-wrapper');
				if (pl) pl.style.display = 'none';
				if (bw) {
					bw.classList.remove('overflow-hidden');
					bw.classList.add('overflow-x-hidden');
				}
				document.documentElement.classList.add('hide-preloader');
			}, 4200);

			// Clear session ONLY if user loads the HOME PAGE natively (F5 or direct link)
			if (window.location.pathname === '/') {
				try {
					const navEntries = window.performance && window.performance.getEntriesByType && window.performance.getEntriesByType('navigation');
					const navType = (navEntries && navEntries.length > 0) ? navEntries[0].type : '';
					if (navType === 'reload' || navType === 'navigate' || navType === 'back_forward') {
						sessionStorage.removeItem('portfolioLoaded');
					}
				} catch (e) { console.error('Navigation timing API unsupported'); }
			}
			
			if (sessionStorage.getItem('portfolioLoaded')) {
				document.documentElement.classList.add('hide-preloader');
			}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
